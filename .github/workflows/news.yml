name: Bulk Backdated Contribution
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2026-01-01'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2026-06-24'

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backdate Commits
        run: |
          git config --global user.name "SENTERNET-Developer"
          git config --global user.email "senternettechnologies@gmail.com"
          
          START=$(date -d "${{ github.event.inputs.start_date }}" +%s)
          END=$(date -d "${{ github.event.inputs.end_date }}" +%s)
          
          for (( d=$START; d<=$END; d+=86400 )); do
            DATE_STR=$(date -d "@$d" +%Y-%m-%d)
            echo "Backfilling for $DATE_STR" >> contributions.txt
            git add contributions.txt
            
            GIT_AUTHOR_DATE="$DATE_STR 12:00:00" GIT_COMMITTER_DATE="$DATE_STR 12:00:00" \
            git commit -m "feat: retrospective contribution for $DATE_STR"
          done
          
          git push origin main
